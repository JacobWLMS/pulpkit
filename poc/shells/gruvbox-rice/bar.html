<!DOCTYPE html>
<html data-theme="gruvbox">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="theme.css">
<style>
  :root {
    --grv-bg-hard: #1d2021;
    --grv-bg: #282828;
    --grv-bg1: #3c3836;
    --grv-bg2: #504945;
    --grv-bg3: #665c54;
    --grv-bg4: #7c6f64;
    --grv-fg: #ebdbb2;
    --grv-fg1: #d5c4a1;
    --grv-fg2: #bdae93;
    --grv-fg-dim: #a89984;
    --grv-fg-dark: #665c54;
    --grv-red: #fb4934;
    --grv-green: #b8bb26;
    --grv-yellow: #fabd2f;
    --grv-blue: #83a598;
    --grv-purple: #d3869b;
    --grv-aqua: #8ec07c;
    --grv-orange: #fe8019;
    --grv-orange-dim: #d65d0e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrainsMono Nerd Font', 'FiraCode Nerd Font', monospace;
    font-size: 12.5px;
    background: var(--grv-bg-hard);
    color: var(--grv-fg);
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 5px;
    gap: 4px;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  /* ── Segments ── */
  .seg {
    display: flex;
    align-items: center;
    height: 30px;
    background: var(--grv-bg);
    border-radius: 6px;
    padding: 0 10px;
    gap: 7px;
    border-top: 2px solid var(--seg-accent);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .seg-ws   { --seg-accent: var(--grv-orange); }
  .seg-task  { --seg-accent: var(--grv-yellow); flex: 1; min-width: 0; overflow: hidden; }
  .seg-sys   { --seg-accent: var(--grv-aqua); }
  .seg-ctrl  { --seg-accent: var(--grv-blue); }
  .seg-clock { --seg-accent: var(--grv-green); }

  /* ── Workspaces ── */
  .distro { font-size: 14px; color: var(--grv-blue); }

  .ws-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--grv-fg-dark);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .ws-dot.active {
    border-color: var(--grv-orange);
    background: var(--grv-orange);
    box-shadow: 0 0 6px rgba(254,128,25,0.4);
    animation: ws-glow 2s ease-in-out infinite;
  }
  .ws-dot:hover {
    border-color: var(--grv-orange);
    transform: scale(1.3);
  }
  @keyframes ws-glow {
    0%,100% { box-shadow: 0 0 4px rgba(254,128,25,0.3); }
    50%     { box-shadow: 0 0 8px rgba(254,128,25,0.6); }
  }

  /* ── Taskbar ── */
  .task-app {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .task-app:hover { background: var(--grv-bg1); }
  .task-app.focused {
    background: var(--grv-bg1);
    box-shadow: inset 0 -2px 0 var(--grv-yellow);
  }
  .task-app img { width: 16px; height: 16px; }
  .task-label {
    font-size: 11.5px;
    color: var(--grv-fg2);
    max-width: 130px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-app.focused .task-label { color: var(--grv-fg); }
  .no-win { font-size: 11px; color: var(--grv-fg-dark); font-style: italic; }

  /* ── System Monitor ── */
  .sys-item { display: flex; align-items: center; gap: 4px; }
  .sys-icon { font-size: 13px; }
  .sys-val {
    font-size: 11px; color: var(--grv-fg1);
    font-variant-numeric: tabular-nums;
  }
  .mini-bar {
    width: 28px; height: 4px;
    background: var(--grv-bg3);
    border-radius: 2px;
    overflow: hidden;
  }
  .mini-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .sys-sep { color: var(--grv-fg-dark); font-size: 10px; margin: 0 1px; }

  /* ── Controls ── */
  .ctrl-btn {
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 2px 5px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: var(--grv-bg1); }
  .ctrl-icon { font-size: 14px; }
  .ctrl-val {
    font-size: 10.5px; color: var(--grv-fg2);
    font-variant-numeric: tabular-nums;
  }
  .tray-icon {
    width: 16px; height: 16px;
    cursor: pointer; opacity: 0.7;
    transition: opacity 0.15s;
  }
  .tray-icon:hover { opacity: 1; }
  .tray-sep {
    width: 1px; height: 14px;
    background: var(--grv-fg-dark);
    margin: 0 2px;
  }

  /* ── Clock ── */
  .clock-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.15;
  }
  .clock-time {
    font-size: 13px; font-weight: 700;
    color: var(--grv-fg);
    letter-spacing: 0.5px;
  }
  .clock-date {
    font-size: 9.5px;
    color: var(--grv-fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="seg seg-ws" id="workspaces"></div>
  <div class="seg seg-task" id="taskbar"></div>
  <div class="seg seg-sys" id="sysmon"></div>
  <div class="seg seg-ctrl" id="controls"></div>
  <div class="seg seg-clock" id="clock"></div>

  <script>
    function send(o) { window.webkit.messageHandlers.pulpkit.postMessage(JSON.stringify(o)); }
    function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    let _st = {};
    function sendThrottled(key, o) {
      if (window['_t_'+key]) return;
      send(o);
      window['_t_'+key] = setTimeout(() => { delete window['_t_'+key]; }, 80);
    }
    // Icon map — defined here (inline) so encoding is correct
    const I = {
      arch:     String.fromCodePoint(0xF303),
      vol_hi:   String.fromCodePoint(0xF057E),
      vol_md:   String.fromCodePoint(0xF0580),
      vol_lo:   String.fromCodePoint(0xF057F),
      vol_x:    String.fromCodePoint(0xF075F),
      wf_4:     String.fromCodePoint(0xF0928),
      wf_3:     String.fromCodePoint(0xF0925),
      wf_2:     String.fromCodePoint(0xF0922),
      wf_1:     String.fromCodePoint(0xF091F),
      wf_x:     String.fromCodePoint(0xF092D),
      bat_f:    String.fromCodePoint(0xF0079),
      bat_8:    String.fromCodePoint(0xF0082),
      bat_5:    String.fromCodePoint(0xF007E),
      bat_2:    String.fromCodePoint(0xF007B),
      bat_1:    String.fromCodePoint(0xF007A),
      bat_c:    String.fromCodePoint(0xF0084),
      cpu:      String.fromCodePoint(0xF035B),
      bri:      String.fromCodePoint(0xF00DF),
      power:    String.fromCodePoint(0xF0425),
      lock:     String.fromCodePoint(0xF033E),
      suspend:  String.fromCodePoint(0xF05FC),
      logout:   String.fromCodePoint(0xF0426),
      reboot:   String.fromCodePoint(0xF0709),
      shutdown: String.fromCodePoint(0xF0904),
      bt:       String.fromCodePoint(0xF00AF),
      night:    String.fromCodePoint(0xF0335),
      dnd:      String.fromCodePoint(0xF0376),
      gear:     String.fromCodePoint(0xF0493),
      search:   String.fromCodePoint(0xF0349),
      check:    String.fromCodePoint(0xF012C),
      mem:      String.fromCodePoint(0xF035B),
    };
  </script>
  <script src="components/workspaces.js"></script>
  <script src="components/taskbar.js"></script>
  <script src="components/status.js"></script>
  <script src="components/clock.js"></script>
  <script src="components/tray.js"></script>
  <script>
    function updateState(s) {
      _st = s;
      document.documentElement.setAttribute('data-theme', 'gruvbox');
      renderWorkspaces(s);
      renderTaskbar(s);
      renderStatus(s);
      renderTray(s);
      renderClock(s);
    }
  </script>
</body>
</html>
