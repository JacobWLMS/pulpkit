<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'SF Pro Display', system-ui, sans-serif;
    font-size: 12px; font-weight: 500;
    background: rgba(20, 20, 35, 0.65);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    color: rgba(255,255,255,0.9);
    height: 100vh;
    display: flex; align-items: center;
    padding: 0 8px;
    overflow: hidden; user-select: none; -webkit-user-select: none;
  }
  .bar { display: flex; width: 100%; height: 100%; align-items: center; }
  .left, .right { display: flex; align-items: center; gap: 6px; }
  .left { flex: 1; }
  .right { flex: 1; justify-content: flex-end; }

  .workspaces { display: flex; gap: 4px; }
  .ws {
    width: 8px; height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    cursor: pointer; transition: all 0.2s ease;
  }
  .ws:hover { background: rgba(255,255,255,0.5); transform: scale(1.3); }
  .ws.active { background: rgba(255,255,255,0.9); box-shadow: 0 0 8px rgba(255,255,255,0.4); }

  .taskbar { display: flex; gap: 4px; margin-left: 12px; }
  .task {
    padding: 3px; cursor: pointer; opacity: 0.6;
    transition: all 0.2s ease;
  }
  .task:hover { opacity: 1; transform: scale(1.1); }
  .task.focused { opacity: 1; }
  .task img { width: 20px; height: 20px; }
  .task .fallback { font-size: 10px; padding: 2px 4px; }

  .tray { display: flex; gap: 6px; margin-right: 8px; }
  .tray-icon { width: 14px; height: 14px; opacity: 0.7; }

  .pill {
    padding: 4px 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    color: rgba(255,255,255,0.8);
    font-size: 11px; letter-spacing: 0.3px;
    cursor: pointer; transition: all 0.2s ease;
  }
  .pill:hover { background: rgba(255,255,255,0.15); }
  .pill .icon { font-family: 'JetBrainsMono Nerd Font'; font-size: 13px; }

  .clock {
    font-size: 13px; font-weight: 600;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.95);
  }

  .status { display: flex; gap: 3px; align-items: center; }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80; /* green = good */
    box-shadow: 0 0 6px rgba(74,222,128,0.5);
  }
  .status-dot.warn { background: #fbbf24; box-shadow: 0 0 6px rgba(251,191,36,0.5); }
  .status-dot.error { background: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.5); }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="bar">
  <div class="left">
    <div class="pill" onclick="send({cmd:'popup',data:'launcher'})"><span class="icon">󰍉</span></div>
    <div class="workspaces" id="workspaces"></div>
    <div class="taskbar" id="taskbar"></div>
  </div>
  <div class="center">
    <span class="clock" id="clock"></span>
  </div>
  <div class="right">
    <div class="tray" id="tray"></div>
    <div class="status">
      <span class="status-dot" id="net-dot"></span>
      <span class="status-dot" id="bat-dot"></span>
    </div>
    <div class="pill" onclick="send({cmd:'popup',data:'settings'})">
      <span class="icon" id="volume">󰕾</span>
      <span id="vol-pct" style="margin-left:4px">50</span>
    </div>
    <div class="pill" id="battery" onclick="send({cmd:'popup',data:'config'})"></div>
    <div class="pill" onclick="send({cmd:'popup',data:'power'})"><span class="icon">󰐥</span></div>
  </div>
</div>
<script>
function send(o){window.webkit.messageHandlers.pulpkit.postMessage(JSON.stringify(o))}
function volIcon(v,m){if(m)return'󰝟';if(v>50)return'󰕾';if(v>0)return'󰖀';return'󰕿'}

function updateClock(){
  const d=new Date();
  const h=String(d.getHours()).padStart(2,'0');
  const m=String(d.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent=h+' : '+m;
}
updateClock();setInterval(updateClock,1000);

function updateState(s){
  const ws=document.getElementById('workspaces');ws.innerHTML='';
  s.ws.forEach(w=>{
    const e=document.createElement('span');
    e.className='ws'+(w.active?' active':'');
    e.onclick=()=>send({cmd:'ws_go',data:w.idx});
    ws.appendChild(e);
  });

  const tb=document.getElementById('taskbar');tb.innerHTML='';
  (s.windows||[]).forEach(w=>{
    const e=document.createElement('span');
    e.className='task'+(w.focused?' focused':'');
    e.title=w.title;
    if(w.icon){const img=document.createElement('img');img.src=w.icon;img.draggable=false;e.appendChild(img);}
    else{const t=document.createElement('span');t.className='fallback';t.textContent=w.app_id.split('.').pop()||'?';e.appendChild(t);}
    e.onclick=()=>send({cmd:'focus_window',data:w.id});
    tb.appendChild(e);
  });

  const tray=document.getElementById('tray');tray.innerHTML='';
  (s.tray_items||[]).forEach(t=>{
    const wrap=document.createElement('span');wrap.style.cursor='pointer';wrap.title=t.title||t.id;
    wrap.onclick=()=>send({cmd:'tray_activate',data:{address:t.address,click:'left'}});
    wrap.oncontextmenu=(e)=>{e.preventDefault();send({cmd:'tray_activate',data:{address:t.address,click:'right'}});};
    if(t.icon){const img=document.createElement('img');img.className='tray-icon';img.src=t.icon;img.draggable=false;wrap.appendChild(img);}
    tray.appendChild(wrap);
  });

  document.getElementById('volume').textContent=volIcon(s.vol,s.muted);
  document.getElementById('vol-pct').textContent=s.vol;

  const nd=document.getElementById('net-dot');
  nd.className='status-dot'+(s.wifi?'':' error');
  nd.title=s.wifi||'Disconnected';

  const bd=document.getElementById('bat-dot');
  if(s.has_bat){bd.className='status-dot'+(s.bat<=20?' error':s.bat<=50?' warn':'');bd.title=s.bat+'%';bd.style.display='';}
  else{bd.style.display='none';}

  const bat=document.getElementById('battery');
  if(s.has_bat){bat.textContent=s.bat+'%';bat.classList.remove('hidden');}
  else{bat.classList.add('hidden');}
}
</script>
</body>
</html>
