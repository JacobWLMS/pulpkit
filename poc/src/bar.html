<!DOCTYPE html>
<html>
<head>
<style>
  /* ── Theme definitions ─────────────────────────── */
  :root, [data-theme="mocha"] {
    --bg: #181825; --bg-surface: #1e1e2e; --bg-overlay: #313244;
    --fg: #cdd6f4; --fg-muted: #a6adc8; --fg-dim: #585b70;
    --accent: #cba6f7; --blue: #89b4fa; --green: #a6e3a1;
    --red: #f38ba8; --yellow: #f9e2af; --peach: #fab387;
    --teal: #94e2d5; --pink: #f2cdcd; --mauve: #cba6f7;
    --text-on-color: #181825;
  }
  [data-theme="macchiato"] {
    --bg: #1e2030; --bg-surface: #24273a; --bg-overlay: #363a4f;
    --fg: #cad3f5; --fg-muted: #a5adcb; --fg-dim: #5b6078;
    --accent: #c6a0f6; --blue: #8aadf4; --green: #a6da95;
    --red: #ed8796; --yellow: #eed49f; --peach: #f5a97f;
    --teal: #8bd5ca; --pink: #f0c6c6; --mauve: #c6a0f6;
    --text-on-color: #1e2030;
  }
  [data-theme="frappe"] {
    --bg: #292c3c; --bg-surface: #303446; --bg-overlay: #414559;
    --fg: #c6d0f5; --fg-muted: #a5adce; --fg-dim: #626880;
    --accent: #ca9ee6; --blue: #8caaee; --green: #a6d189;
    --red: #e78284; --yellow: #e5c890; --peach: #ef9f76;
    --teal: #81c8be; --pink: #eebebe; --mauve: #ca9ee6;
    --text-on-color: #292c3c;
  }
  [data-theme="latte"] {
    --bg: #e6e9ef; --bg-surface: #eff1f5; --bg-overlay: #ccd0da;
    --fg: #4c4f69; --fg-muted: #6c6f85; --fg-dim: #9ca0b0;
    --accent: #8839ef; --blue: #1e66f5; --green: #40a02b;
    --red: #d20f39; --yellow: #df8e1d; --peach: #fe640b;
    --teal: #179299; --pink: #ea76cb; --mauve: #8839ef;
    --text-on-color: #eff1f5;
  }
  [data-theme="tokyonight"] {
    --bg: #1a1b26; --bg-surface: #16161e; --bg-overlay: #24283b;
    --fg: #c0caf5; --fg-muted: #565f89; --fg-dim: #414868;
    --accent: #7aa2f7; --blue: #7aa2f7; --green: #9ece6a;
    --red: #f7768e; --yellow: #e0af68; --peach: #ff9e64;
    --teal: #73daca; --pink: #bb9af7; --mauve: #bb9af7;
    --text-on-color: #1a1b26;
  }
  [data-theme="nord"] {
    --bg: #2e3440; --bg-surface: #3b4252; --bg-overlay: #434c5e;
    --fg: #eceff4; --fg-muted: #d8dee9; --fg-dim: #4c566a;
    --accent: #88c0d0; --blue: #81a1c1; --green: #a3be8c;
    --red: #bf616a; --yellow: #ebcb8b; --peach: #d08770;
    --teal: #8fbcbb; --pink: #b48ead; --mauve: #b48ead;
    --text-on-color: #2e3440;
  }
  [data-theme="gruvbox"] {
    --bg: #1d2021; --bg-surface: #282828; --bg-overlay: #3c3836;
    --fg: #ebdbb2; --fg-muted: #a89984; --fg-dim: #665c54;
    --accent: #d79921; --blue: #458588; --green: #98971a;
    --red: #cc241d; --yellow: #d79921; --peach: #d65d0e;
    --teal: #689d6a; --pink: #b16286; --mauve: #b16286;
    --text-on-color: #1d2021;
  }
  [data-theme="rosepine"] {
    --bg: #191724; --bg-surface: #1f1d2e; --bg-overlay: #26233a;
    --fg: #e0def4; --fg-muted: #908caa; --fg-dim: #6e6a86;
    --accent: #c4a7e7; --blue: #9ccfd8; --green: #31748f;
    --red: #eb6f92; --yellow: #f6c177; --peach: #f6c177;
    --teal: #9ccfd8; --pink: #ebbcba; --mauve: #c4a7e7;
    --text-on-color: #191724;
  }

  /* ── Base styles using variables ────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'JetBrainsMono Nerd Font', 'JetBrainsMono NF', monospace;
    font-size: 13px;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex; align-items: center;
    overflow: hidden; user-select: none; -webkit-user-select: none;
    transition: background 0.3s, color 0.3s;
  }
  .bar { display: flex; width: 100%; height: 100%; align-items: center; }
  .left, .right { display: flex; align-items: center; }
  .left { flex: 1; }
  .right { flex: 1; justify-content: flex-end; }

  .workspaces { display: flex; align-items: center; }
  .ws {
    width: 32px; height: 28px; margin: 6px 2px;
    background: var(--bg-surface); color: var(--fg-dim);
    font-size: 14px; cursor: pointer;
    transition: all 0.15s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .ws:hover { background: var(--bg-overlay); color: var(--fg); }
  .ws.active { background: var(--accent); color: var(--text-on-color); font-weight: 700; }

  .taskbar { display: flex; align-items: center; gap: 2px; margin-left: 6px; }
  .task {
    padding: 4px 6px; margin: 6px 1px;
    background: var(--bg-surface);
    cursor: pointer; transition: all 0.15s ease;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .task:hover { background: var(--bg-overlay); }
  .task.focused { background: var(--bg-overlay); }
  .task.focused::after {
    content: ''; position: absolute; bottom: 0; left: 25%; right: 25%;
    height: 2px; background: var(--accent);
  }
  .task img { width: 24px; height: 24px; }
  .task .fallback {
    font-size: 11px; color: var(--fg-muted); padding: 2px 4px;
    max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .tray { display: flex; align-items: center; gap: 4px; margin-right: 4px; }
  .tray-icon { width: 18px; height: 18px; opacity: 0.85; }

  .mod {
    margin: 6px 3px; padding: 8px 14px;
    color: var(--text-on-color); font-size: 13px;
    cursor: pointer; transition: all 0.15s ease;
  }
  .mod:hover { filter: brightness(0.9); transform: translateY(-1px); }
  .mod:active { transform: translateY(0); }
  .mod-search   { background: var(--blue); margin-left: 6px; }
  .mod-memory   { background: var(--peach); }
  .mod-network  { background: var(--teal); padding-right: 17px; }
  .mod-volume   { background: var(--yellow); }
  .mod-battery  { background: var(--red); }
  .mod-battery.charging { background: var(--green); }
  .mod-battery.warning  { background: #ff0000; color: #FFFF00; animation: pulse 1s ease infinite; }
  .mod-clock    { background: var(--mauve); }
  .mod-settings { background: var(--green); }
  .mod-power    { background: var(--pink); margin-right: 6px; }
  .hidden { display: none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
</style>
</head>
<body>
<div class="bar">
  <div class="left">
    <span class="mod mod-search" data-left="popup:launcher" oncontextmenu="ctx(event)" data-right="popup:launcher">󰍉</span>
    <div class="workspaces" id="workspaces"></div>
    <div class="taskbar" id="taskbar"></div>
  </div>
  <div class="center">
    <span class="mod mod-clock" id="clock"></span>
  </div>
  <div class="right">
    <div class="tray" id="tray"></div>
    <span class="mod mod-memory" id="memory" oncontextmenu="ctx(event)" data-left="popup:config" data-right="popup:config"></span>
    <span class="mod mod-network" id="network" oncontextmenu="ctx(event)" data-left="popup:wifi" data-right="popup:settings"></span>
    <span class="mod mod-volume" id="volume" oncontextmenu="ctx(event)" data-left="popup:settings" data-right="vol_mute"></span>
    <span class="mod mod-battery" id="battery" oncontextmenu="ctx(event)" data-left="popup:settings" data-right="popup:config"></span>
    <span class="mod mod-settings" oncontextmenu="ctx(event)" data-left="popup:config" data-right="popup:settings">󰒓</span>
    <span class="mod mod-power" oncontextmenu="ctx(event)" data-left="popup:power" data-right="power_lock">󰤆</span>
  </div>
</div>
<script>
function send(o){window.webkit.messageHandlers.pulpkit.postMessage(JSON.stringify(o))}
function dispatch(a){if(!a)return;if(a.startsWith('popup:'))send({cmd:'popup',data:a.slice(6)});else send({cmd:a});}
document.addEventListener('click',e=>{const m=e.target.closest('[data-left]');if(m)dispatch(m.dataset.left);});
function ctx(e){e.preventDefault();const m=e.target.closest('[data-right]');if(m)dispatch(m.dataset.right);}

function volIcon(v,m){if(m)return'󰝟';if(v>50)return'󰕾';if(v>0)return'󰖀';return'󰕿'}
function wifiIcon(s){return s?'󰤨':'󰤭'}
const batI=['󰁺','󰁻','󰁼','󰁽','󰁾','󰁿','󰂀','󰂁','󰂂','󰁹'];
const batCI=['󰢜','󰂆','󰂇','󰂈','󰢝','󰂉','󰢞','󰂊','󰂋','󰂅'];
function batIcon(p,s){return(s==='Charging'?batCI:batI)[Math.min(Math.floor(p/10),9)]}

// Theme persistence
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('pulpkit-theme',t);}
(function(){const t=localStorage.getItem('pulpkit-theme');if(t)setTheme(t);})();

function updateClock(){
  const d=new Date();let h=d.getHours();const a=h>=12?'PM':'AM';h=h%12||12;
  const time=h+':'+String(d.getMinutes()).padStart(2,'0')+' '+a;
  const el=document.getElementById('clock');if(el.textContent!==time)el.textContent=time;
}
updateClock();setInterval(updateClock,1000);

function updateState(s){
  // Apply theme from Rust state (synced across bar + popup)
  if(s.theme) document.documentElement.setAttribute('data-theme', s.theme);

  const ws=document.getElementById('workspaces');ws.innerHTML='';
  s.ws.forEach(w=>{
    const e=document.createElement('span');e.className='ws'+(w.active?' active':'');
    e.textContent=w.idx;
    e.onclick=()=>send({cmd:'ws_go',data:w.idx});ws.appendChild(e);
  });

  const tb=document.getElementById('taskbar');tb.innerHTML='';
  (s.windows||[]).forEach(w=>{
    const e=document.createElement('span');e.className='task'+(w.focused?' focused':'');e.title=w.title;
    if(w.icon){const img=document.createElement('img');img.src=w.icon;img.draggable=false;e.appendChild(img);}
    else{const t=document.createElement('span');t.className='fallback';t.textContent=w.app_id.split('.').pop()||'?';e.appendChild(t);}
    e.onclick=()=>send({cmd:'focus_window',data:w.id});tb.appendChild(e);
  });

  const tray=document.getElementById('tray');tray.innerHTML='';
  (s.tray_items||[]).forEach(t=>{
    const wrap=document.createElement('span');wrap.style.cursor='pointer';wrap.title=t.title||t.id;
    wrap.onclick=()=>send({cmd:'tray_activate',data:{address:t.address,click:'left'}});
    wrap.oncontextmenu=(e)=>{e.preventDefault();send({cmd:'tray_activate',data:{address:t.address,click:'right'}});};
    if(t.icon){const img=document.createElement('img');img.className='tray-icon';img.src=t.icon;img.draggable=false;wrap.appendChild(img);}
    tray.appendChild(wrap);
  });

  document.getElementById('memory').textContent='󰍛 '+s.mem+'%';
  const n=document.getElementById('network');n.textContent=wifiIcon(s.wifi);n.title=s.wifi||'Disconnected';
  const v=document.getElementById('volume');v.textContent=volIcon(s.vol,s.muted);v.title='Vol: '+s.vol+'%'+(s.muted?' (muted)':'');
  const b=document.getElementById('battery');
  if(s.has_bat){
    b.className='mod mod-battery'+(s.bat_status==='Charging'?' charging':'')+(s.bat<=20&&s.bat_status!=='Charging'?' warning':'');
    b.textContent=s.bat+'% '+batIcon(s.bat,s.bat_status);b.classList.remove('hidden');
  }else{b.classList.add('hidden');}
}
</script>
</body>
</html>
